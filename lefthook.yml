pre-commit:
  parallel: true
  commands:

    flake-eval:
      glob: "home-manager/**/*.nix"
      run: nix flake check --no-build ./home-manager

    home-manager-wsl:
      glob: "home-manager/**/*.nix"
      run: REPO_DIR=$(git rev-parse --show-toplevel)/.. nix build ./home-manager#homeConfigurations.wsl.activationPackage --dry-run --impure
